name: Fix Nix vendor hash

on:
  pull_request:
    paths:
      - 'go.mod'
      - 'go.sum'
      - 'package.json'
      - 'package-lock.json'

permissions:
  contents: write

jobs:
  fix-vendor-hash:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-25.11

      - name: Update hashes
        run: |
          # Up to 3 attempts: npmDeps hash, then vendorHash, then verify
          for i in 1 2 3; do
            BUILD_OUTPUT=$(nix build .#rememory 2>&1) && break

            NEW_HASH=$(echo "$BUILD_OUTPUT" | grep -oE 'got:\s+\S+' | sed 's/got:[[:space:]]*//' || true)
            if [ -z "$NEW_HASH" ]; then
              echo "Build failed but no hash mismatch found:"
              echo "$BUILD_OUTPUT"
              exit 1
            fi

            if echo "$BUILD_OUTPUT" | grep -q 'npm-deps'; then
              echo "Updating npmDeps hash: $NEW_HASH"
              sed -i "/fetchNpmDeps/,/};/ s|hash = \".*\"|hash = \"$NEW_HASH\"|" flake.nix
            else
              echo "Updating vendorHash: $NEW_HASH"
              sed -i "s|vendorHash = \".*\"|vendorHash = \"$NEW_HASH\"|" flake.nix
            fi
          done

      - name: Commit updated flake.nix
        run: |
          git diff --quiet flake.nix && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add flake.nix
          git commit -m "fix: update Nix hashes for dependency changes"
          git push
