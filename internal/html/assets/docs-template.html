<!DOCTYPE html>
<html lang="{{LANG}}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="generator" content="ReMemory {{VERSION}}">
  <title>{{PAGE_TITLE}}</title>
  <meta name="description" content="{{PAGE_SUBTITLE}}">
  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="{{PAGE_TITLE}}">
  <meta property="og:description" content="{{PAGE_SUBTITLE}}">
  <meta property="og:image" content="{{GITHUB_PAGES}}/screenshots/recovery-1.png">
  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{PAGE_TITLE}}">
  <meta name="twitter:description" content="{{PAGE_SUBTITLE}}">
  <meta name="twitter:image" content="{{GITHUB_PAGES}}/screenshots/recovery-1.png">
  <style>{{STYLES}}</style>
  <style>
    /* Documentation page layout */
    .docs-nav {
      background: var(--paper-light);
      padding: 1rem 2rem;
      box-shadow: 0 2px 4px rgba(46,42,38,0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      max-width: 1200px;
      margin: 0 auto 0;
    }

    .docs-nav .logo {
      font-size: 1.25rem;
      font-weight: bold;
      color: var(--text);
      text-decoration: none;
    }

    .docs-nav .nav-links {
      display: flex;
      gap: 1.5rem;
    }

    .docs-nav .nav-links a {
      color: var(--dusty-blue);
      text-decoration: none;
    }

    .docs-nav .nav-links a:hover {
      text-decoration: underline;
    }

    /* Sidebar + main layout */
    .docs-layout {
      display: flex;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 2rem;
      gap: 2.5rem;
    }

    .docs-sidebar {
      width: 240px;
      flex-shrink: 0;
      position: sticky;
      top: 1rem;
      max-height: calc(100vh - 2rem);
      overflow-y: auto;
      padding: 1.5rem 0;
      align-self: flex-start;
    }

    .docs-main {
      flex: 1;
      min-width: 0;
      max-width: 800px;
      padding: 1.5rem 0 2rem;
    }

    /* Sidebar TOC */
    .toc {
      padding: 0;
      font-size: 0.875rem;
    }

    .toc h2 {
      font-size: 0.75rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.75rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border-light);
    }

    .toc ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .toc li {
      margin-bottom: 0.125rem;
    }

    .toc a {
      color: var(--text);
      text-decoration: none;
      display: block;
      padding: 0.25rem 0.75rem;
      border-left: 2px solid transparent;
      border-radius: 0 4px 4px 0;
      transition: all 0.15s ease;
    }

    .toc a:hover {
      color: var(--dusty-blue);
      background: var(--sage-tint);
    }

    .toc a.active {
      color: var(--dusty-blue);
      border-left-color: var(--dusty-blue);
      background: var(--sage-tint);
      font-weight: 500;
    }

    .toc .indent {
      margin-left: 0;
    }

    .toc .indent a {
      padding-left: 1.5rem;
      font-size: 0.8125rem;
    }

    /* Header */
    .docs-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .docs-header h1 {
      color: var(--text);
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }

    .docs-header p {
      color: var(--text-secondary);
    }

    /* Content sections */
    .doc-section {
      background: var(--paper-light);
      border-radius: 8px;
      padding: 2rem;
      box-shadow: 0 2px 4px rgba(46,42,38,0.08);
      margin-bottom: 2rem;
    }

    .doc-section h2 {
      color: var(--text);
      font-size: 1.5rem;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid var(--sage);
    }

    .doc-section h3 {
      color: var(--text);
      font-size: 1.25rem;
      margin-top: 1.5rem;
      margin-bottom: 0.75rem;
    }

    .doc-section p {
      color: var(--text);
      line-height: 1.7;
      margin-bottom: 1rem;
    }

    .doc-section ul, .doc-section ol {
      color: var(--text);
      line-height: 1.7;
      margin-bottom: 1rem;
      padding-left: 1.5rem;
    }

    .doc-section li {
      margin-bottom: 0.5rem;
    }

    .doc-section code {
      background: var(--sand);
      padding: 0.2rem 0.4rem;
      border-radius: 3px;
      font-family: monospace;
      font-size: 0.9rem;
    }

    .screenshot {
      margin: 1.5rem 0;
      text-align: center;
    }

    .screenshot img {
      max-width: 100%;
      border-radius: 8px;
      box-shadow: 0 4px 12px rgba(46,42,38,0.12);
    }

    .screenshot figcaption {
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-top: 0.75rem;
      font-style: italic;
    }

    .screenshot-placeholder {
      background: var(--sand);
      border: 2px dashed var(--border);
      border-radius: 8px;
      padding: 3rem 2rem;
      text-align: center;
      color: var(--text-secondary);
    }

    .screenshot-placeholder .icon {
      font-size: 3rem;
      margin-bottom: 1rem;
      opacity: 0.5;
    }

    .tip {
      background: var(--sage-tint);
      border-left: 4px solid var(--sage);
      padding: 1rem 1.5rem;
      border-radius: 0 8px 8px 0;
      margin: 1rem 0;
    }

    .tip strong {
      color: var(--sage-dark);
    }

    .warning {
      background: var(--warning-bg);
      border-left: 4px solid var(--warning-border);
      padding: 1rem 1.5rem;
      border-radius: 0 8px 8px 0;
      margin: 1rem 0;
    }

    .warning strong {
      color: var(--warning-text);
    }

    .step-guide {
      display: flex;
      gap: 1.5rem;
      margin: 1.5rem 0;
      align-items: flex-start;
    }

    .step-guide .step-number {
      background: var(--sage);
      color: var(--paper-light);
      width: 36px;
      height: 36px;
      min-width: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }

    .step-guide .step-content {
      flex: 1;
    }

    .step-guide .step-content h4 {
      color: var(--text);
      margin-bottom: 0.5rem;
    }

    .bundle-contents {
      background: var(--sand);
      border-radius: 8px;
      padding: 1rem 1.5rem;
      font-family: monospace;
      font-size: 0.9rem;
    }

    .bundle-contents .file {
      display: flex;
      gap: 1rem;
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--border-light);
    }

    .bundle-contents .file:last-child {
      border-bottom: none;
    }

    .bundle-contents .file-name {
      color: var(--text);
      font-weight: 500;
    }

    .bundle-contents .file-desc {
      color: var(--text-secondary);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .docs-footer {
      text-align: center;
      padding: 2rem 0;
      color: var(--text-secondary);
      font-size: 0.875rem;
    }

    .docs-footer a {
      color: var(--dusty-blue);
      text-decoration: none;
    }

    .docs-footer a:hover {
      text-decoration: underline;
    }

    .lang-picker {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-top: 0.75rem;
    }

    .lang-picker a,
    .lang-picker span {
      padding: 0.25rem 0.6rem;
      border-radius: 4px;
      font-size: 0.8125rem;
    }

    .lang-picker span {
      background: var(--sage-tint);
      color: var(--text);
    }

    .lang-picker a {
      color: var(--dusty-blue);
      text-decoration: none;
    }

    .lang-picker a:hover {
      background: var(--sand);
    }

    /* Mobile: sidebar becomes inline */
    @media (max-width: 768px) {
      .docs-layout {
        flex-direction: column;
        padding: 0 1rem;
        gap: 0;
      }

      .docs-sidebar {
        position: static;
        width: 100%;
        max-height: none;
        overflow-y: visible;
        padding: 0 0 1rem;
      }

      .toc {
        background: var(--paper-light);
        border-radius: 8px;
        padding: 1.25rem;
        box-shadow: 0 2px 4px rgba(46,42,38,0.08);
        margin-bottom: 1rem;
      }

      .toc a {
        border-left: none;
        padding: 0.25rem 0;
      }

      .toc .indent a {
        padding-left: 1rem;
      }

      .docs-main {
        padding: 0 0 2rem;
      }

      .step-guide {
        flex-direction: column;
      }

      .docs-nav {
        flex-direction: column;
        text-align: center;
        margin: 0 1rem;
      }
    }
  </style>
</head>
<body>
  <nav class="docs-nav">
    <a href="index.html" class="logo">{{NAV_HOME}}</a>
    <div class="nav-links">
      <a href="index.html">{{NAV_HOME_LINK}}</a>
      <a href="maker.html">{{NAV_CREATE}}</a>
      <a href="recover.html">{{NAV_RECOVER}}</a>
      <a href="{{GITHUB_REPO}}" target="_blank">GitHub</a>
    </div>
  </nav>

  <div class="docs-layout">
    <aside class="docs-sidebar">
      <nav class="toc">
        <h2>{{TOC_TITLE}}</h2>
        <ul>
{{TOC}}
        </ul>
      </nav>
    </aside>

    <div class="docs-main">
      <header class="docs-header">
        <h1>{{PAGE_TITLE}}</h1>
        <p>{{PAGE_SUBTITLE}}</p>
        <p style="font-size: 0.9rem; color: var(--text-secondary); margin-top: 0.5rem;">
          {{CLI_GUIDE_NOTE}}
        </p>
      </header>

{{DOCS_CONTENT}}

    <footer class="docs-footer">
      <p>ReMemory {{VERSION}}</p>
      <p>
        <a href="{{GITHUB_REPO}}" target="_blank">{{FOOTER_SOURCE}}</a> ·
        <a href="{{GITHUB_URL}}" target="_blank">{{FOOTER_DOWNLOAD}}</a> ·
        <a href="index.html">{{FOOTER_HOME}}</a>
      </p>
{{LANG_PICKER}}
    </footer>
    </div><!-- .docs-main -->
  </div><!-- .docs-layout -->

  <script>
    // Scroll spy: highlight current section in sidebar TOC
    (function() {
      var links = document.querySelectorAll('.toc a');
      var sections = [];
      links.forEach(function(link) {
        var id = link.getAttribute('href').slice(1);
        var el = document.getElementById(id);
        if (el) sections.push({ id: id, el: el, link: link });
      });

      var ticking = false;
      function onScroll() {
        if (ticking) return;
        ticking = true;
        requestAnimationFrame(function() {
          var scrollY = window.scrollY + 80;
          var current = null;
          for (var i = 0; i < sections.length; i++) {
            if (sections[i].el.offsetTop <= scrollY) {
              current = sections[i];
            }
          }
          links.forEach(function(l) { l.classList.remove('active'); });
          if (current) current.link.classList.add('active');
          ticking = false;
        });
      }

      window.addEventListener('scroll', onScroll, { passive: true });
      onScroll();
    })();
  </script>
</body>
</html>
